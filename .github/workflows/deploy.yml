name: deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# One concurrent run per branch so a fast follow-up push cancels the
# previous build instead of racing it to the same Pages deployment.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (static export)
        run: npm run build

      - name: Deploy to Cloudflare Pages
        # On main: deploy to production. On PRs / other refs: a preview
        # build under the same project (CF picks the URL).
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy out
            --project-name=teesql-website
            --branch=${{ github.head_ref || github.ref_name }}
